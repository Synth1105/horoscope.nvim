command_timeout = 100000

format = """
$username\
$hostname\
$directory\
$git_branch\
$line_break\
$character"""

right_format = """
$cmd_duration\
$git_state\
$git_status\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$conda\
$python\
"""

palette = "horoscope"

[palettes.horoscope]
base = "#21202f"
overlay = "#4c4a67"
love = "#f39aad"
gold = "#f8e18a"
rose = "#f08e89"
pine = "#4bb6a8"
foam = "#7ff6ff"
iris = "#b391d2"
text = "#bec2d4"
muted = "#a29fb0"

[directory]
style = "pine"
read_only = " 󱪨 "

[directory.substitutions]
Documents = "󰈙"
Downloads = " "
Music = " "
Pictures = " "
config = " "

[character]
success_symbol = "[󰘧](iris)"
error_symbol = "[󰘧](love)"
vimcmd_symbol = "[󰊕](pine)"

[git_branch]
format = "[](fg:overlay)[ $symbol $branch ]($style)[](fg:overlay) "
style = "bg:overlay fg:foam"
symbol = ""

[git_status]
disabled = false
style = "bg:overlay fg:foam"
format = '[](fg:overlay)[ $all_status$ahead_behind ]($style)[](fg:overlay) '
up_to_date = "✓"
untracked = '?\($count\)'
stashed = '\$'
modified = '!\($count\)'
renamed = '»\($count\)'
deleted = '✘\($count\)'
staged = '++\($count\)'
ahead = '⇡\(${count}\)'
diverged = '⇕[\[⇡\(${ahead_count}\)⇣\(${behind_count}\)\]]'
behind = '⇣\(${count}\)'

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL=" "
else
    GIT_REMOTE_SYMBOL=" "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

[c]
style = " fg:pine"
format = " [$symbol$version]($style)"
disabled = false
symbol = " "

