# horoscope tmux theme
# Inspired by the layout approach used in catppuccin/tmux.

set -g status-style "bg=#21202f,fg=#bec2d4"
set -g message-style "bg=#35344c,fg=#bec2d4"
set -g message-command-style "bg=#b391d2,fg=#21202f"
set -g mode-style "bg=#f8e18a,fg=#21202f,bold"

set -g pane-border-style "fg=#4c4a67"
set -g pane-active-border-style "fg=#96acfe"
set -g display-panes-active-colour "#b391d2"
set -g display-panes-colour "#4c4a67"

set -g status-left-length 100
set -g status-right-length 180
set -g status-left ""
set -g status-right "#[fg=#b391d2,bg=#21202f]î‚¶#[fg=#21202f,bg=#b391d2,bold] ï’‰ #S #[fg=#b391d2,bg=#21202f]î‚´ #[fg=#4bb6a8,bg=#21202f]î‚¶#[fg=#21202f,bg=#4bb6a8,bold] ï‘³ #{cpu} #[fg=#4bb6a8,bg=#21202f]î‚´ #[fg=#35344c,bg=#21202f]î‚¶#[fg=#bec2d4,bg=#35344c,bold] î‰¦ #{mem} #[fg=#35344c,bg=#21202f]î‚´ #[fg=#96acfe,bg=#21202f]î‚¶#[fg=#21202f,bg=#96acfe,bold] َ°’‹ #H #[fg=#96acfe,bg=#21202f]î‚´ #[fg=#f8e18a,bg=#21202f]î‚¶#[fg=#21202f,bg=#f8e18a,bold] َ°ƒ° %Y-%m-%d #[fg=#f8e18a,bg=#21202f]î‚´ #[fg=#f39aad,bg=#21202f]î‚¶#[fg=#21202f,bg=#f39aad,bold] َ°¥” %H:%M #[fg=#f39aad,bg=#21202f]î‚´"

set -g window-status-separator ""
set -g window-status-format "#[fg=#28283a,bg=#21202f]î‚¶#[fg=#bec2d4,bg=#28283a] #I #W #[fg=#28283a,bg=#21202f]î‚´"
set -g window-status-current-format "#[fg=#96acfe,bg=#21202f]î‚¶#[fg=#21202f,bg=#96acfe,bold] #I #{?window_zoomed_flag,َ°پŒ ,}#W #[fg=#96acfe,bg=#21202f]î‚´"
set -g window-status-current-style "none"
set -g window-status-last-style "fg=#aaf5bc"
set -g window-status-activity-style "fg=#f8e18a,bold"
set -g window-status-bell-style "fg=#21202f,bg=#f39aad,bold"

set -g clock-mode-colour "#b391d2"
